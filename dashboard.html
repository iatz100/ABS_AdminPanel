<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogger Admin · OAuth2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* আপনার existing styles গুলো এখানে থাকবে */
    /* ... */
  </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <h1><i class="fab fa-blogger-b"></i> Blogger Admin</h1>
    <div class="user-area" id="userArea">
      <span id="userName" class="hidden" style="font-weight:500;">User</span>
      <div class="avatar" id="avatarBox">👤</div>
      <button class="btn btn-outline hidden" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search by title or description...">
      <button id="searchBtn"><i class="fas fa-arrow-right"></i></button>
    </div>
    <div class="action-group">
      <button class="btn btn-success" id="newPostBtn"><i class="fas fa-plus"></i> New Post</button>
      <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
  </div>

  <!-- Post List -->
  <div id="postListContainer">
    <div class="post-list" id="postList"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="postModal">
  <div class="modal-card">
    <h2 id="modalTitle">Create Post</h2>
    <label>Title</label>
    <input type="text" id="postTitle" placeholder="Post title">

    <label>Content (HTML)</label>
    <textarea id="postContent" placeholder="Write your post content..."></textarea>

    <div class="row">
      <div>
        <label>Labels (comma separated)</label>
        <input type="text" id="postLabels" placeholder="tech, lifestyle">
      </div>
      <div>
        <label>Status</label>
        <select id="postStatus">
          <option value="DRAFT">Draft</option>
          <option value="PUBLISHED">Published</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="modalCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="modalSaveBtn"><i class="fas fa-save"></i> Save</button>
    </div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const CONFIG = {
  // ⚠️ আপনার নিজের Client ID দিন (যা Blogger API এর জন্য enable করা)
  CLIENT_ID: '146025507938-3mnp25rn9ps0gi191ov3c6741n6fj9n6.apps.googleusercontent.com',
  BLOG_ID: '4609132939861743156', // আপনার Blog ID
  SCOPES: 'https://www.googleapis.com/auth/blogger',
};

// ==================== AUTH ====================
const Auth = (() => {
  let tokenClient = null;
  let accessToken = localStorage.getItem('blogger_access_token') || null;
  let tokenExpiry = parseInt(localStorage.getItem('blogger_token_expiry') || '0');
  let currentUser = null;
  let isSignedIn = false;
  let tokenRefreshTimeout = null;

  function init() {
    return new Promise((resolve) => {
      if (typeof google === 'undefined') {
        const script = document.createElement('script');
        script.src = 'https://accounts.google.com/gsi/client';
        script.onload = () => resolve(initTokenClient());
        script.onerror = () => reject('Failed to load Google Identity Services');
        document.head.appendChild(script);
      } else {
        resolve(initTokenClient());
      }
    });
  }

  function initTokenClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CONFIG.CLIENT_ID,
      scope: CONFIG.SCOPES,
      callback: (resp) => {
        if (resp.access_token) {
          handleTokenResponse(resp);
        } else if (resp.error) {
          console.error('Token error:', resp.error);
          isSignedIn = false;
        }
      },
    });

    // যদি token থাকে এবং expiry ভবিষ্যতে হয়
    if (accessToken && tokenExpiry > Date.now()) {
      isSignedIn = true;
      fetchUserInfo();
      scheduleTokenRefresh();
    } else if (accessToken) {
      // Token expired, refresh
      refreshToken();
    }

    return tokenClient;
  }

  function handleTokenResponse(resp) {
    accessToken = resp.access_token;
    const expiresIn = resp.expires_in || 3600;
    tokenExpiry = Date.now() + (expiresIn * 1000) - 60000; // 1 minute buffer
    localStorage.setItem('blogger_access_token', accessToken);
    localStorage.setItem('blogger_token_expiry', String(tokenExpiry));
    isSignedIn = true;
    fetchUserInfo();
    scheduleTokenRefresh();
  }

  function scheduleTokenRefresh() {
    if (tokenRefreshTimeout) clearTimeout(tokenRefreshTimeout);
    const timeUntilRefresh = tokenExpiry - Date.now() - 120000; // 2 minutes before expiry
    if (timeUntilRefresh > 0) {
      tokenRefreshTimeout = setTimeout(() => {
        refreshToken();
      }, timeUntilRefresh);
    }
  }

  function fetchUserInfo() {
    if (!accessToken) return;
    fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${accessToken}` }
    })
      .then(r => {
        if (!r.ok) throw new Error('Failed to fetch user');
        return r.json();
      })
      .then(data => {
        currentUser = data;
        isSignedIn = true;
        // Update UI
        document.dispatchEvent(new Event('authChange'));
      })
      .catch(() => {
        isSignedIn = false;
        localStorage.removeItem('blogger_access_token');
        localStorage.removeItem('blogger_token_expiry');
        document.dispatchEvent(new Event('authChange'));
      });
  }

  function signIn() {
    if (!tokenClient) return;
    tokenClient.requestAccessToken({ prompt: 'consent' });
  }

  function signOut() {
    if (accessToken) {
      fetch(`https://oauth2.googleapis.com/revoke?token=${accessToken}`, {
        method: 'POST'
      }).catch(() => {});
    }

    localStorage.removeItem('blogger_access_token');
    localStorage.removeItem('blogger_token_expiry');
    accessToken = null;
    tokenExpiry = 0;
    isSignedIn = false;
    currentUser = null;
    if (tokenRefreshTimeout) clearTimeout(tokenRefreshTimeout);
    
    document.dispatchEvent(new Event('authChange'));
    window.location.reload(); // অথবা login page এ redirect করুন
  }

  function refreshToken() {
    return new Promise((resolve) => {
      if (!tokenClient) {
        resolve(null);
        return;
      }
      
      tokenClient.requestAccessToken({ 
        prompt: 'none',
        hint: 'Refresh token'
      });
      
      // Callback handle করবে
      resolve(accessToken);
    });
  }

  function getToken() {
    if (!accessToken || tokenExpiry <= Date.now()) {
      return null;
    }
    return accessToken;
  }

  function isAuthenticated() {
    return isSignedIn && !!getToken();
  }

  function getUser() { return currentUser; }

  // Event listener for auth changes
  document.addEventListener('authChange', () => {
    // UI update logic
  });

  return { 
    init, 
    signIn, 
    signOut, 
    getToken, 
    refreshToken, 
    isAuthenticated, 
    getUser 
  };
})();

// ==================== BLOGGER API ====================
const Blogger = (() => {
  const BLOG_ID = CONFIG.BLOG_ID;
  const API_BASE = `https://www.googleapis.com/blogger/v3/blogs/${BLOG_ID}`;

  function getHeaders() {
    const token = Auth.getToken();
    if (!token) throw new Error('No access token available');
    return {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    };
  }

  async function apiFetch(url, options = {}) {
    try {
      let response = await fetch(url, { ...options, headers: getHeaders() });

      // যদি 401 আসে, token refresh করে retry
      if (response.status === 401) {
        await Auth.refreshToken();
        // নতুন token দিয়ে আবার চেষ্টা
        response = await fetch(url, { 
          ...options, 
          headers: getHeaders() 
        });
      }

      if (!response.ok) {
        const errorData = await response.text();
        let errorMessage = errorData;
        try {
          const parsed = JSON.parse(errorData);
          errorMessage = parsed.error?.message || parsed.error || errorData;
        } catch (e) {}
        throw new Error(errorMessage || 'API request failed');
      }

      return response.json();
    } catch (error) {
      if (error.message.includes('No access token')) {
        throw new Error('Please sign in to continue');
      }
      throw error;
    }
  }

  async function listPosts({ pageToken = null, search = '' } = {}) {
    let url = `${API_BASE}/posts?fetchBodies=true&fetchImages=true&status=all&maxResults=10`;
    if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;
    if (search) url += `&q=${encodeURIComponent(search)}`;
    const data = await apiFetch(url);
    return {
      items: data.items || [],
      nextPageToken: data.nextPageToken || null,
      prevPageToken: data.prevPageToken || null,
    };
  }

  async function createPost(post) {
    const url = `${API_BASE}/posts`;
    return apiFetch(url, {
      method: 'POST',
      body: JSON.stringify(post)
    });
  }

  async function updatePost(postId, post) {
    const url = `${API_BASE}/posts/${postId}`;
    return apiFetch(url, {
      method: 'PUT',
      body: JSON.stringify(post)
    });
  }

  async function deletePost(postId) {
    const url = `${API_BASE}/posts/${postId}`;
    await apiFetch(url, { method: 'DELETE' });
    return true;
  }

  async function publishPost(postId) {
    const url = `${API_BASE}/posts/${postId}/publish`;
    return apiFetch(url, { method: 'POST' });
  }

  async function revertPost(postId) {
    const url = `${API_BASE}/posts/${postId}/revert`;
    return apiFetch(url, { method: 'POST' });
  }

  return { listPosts, createPost, updatePost, deletePost, publishPost, revertPost };
})();

// ==================== DASHBOARD ====================
(function Dashboard() {
  // ... আপনার existing dashboard code
  // তবে Auth.isAuthenticated() চেক করে UI update করুন
  
  // Example updateUI function:
  function updateUI() {
    const signedIn = Auth.isAuthenticated();
    const user = Auth.getUser();
    
    if (signedIn && user) {
      document.getElementById('logoutBtn').classList.remove('hidden');
      document.getElementById('userName').classList.remove('hidden');
      document.getElementById('userName').innerText = user.name || 'User';
      document.getElementById('avatarBox').innerText = user.name ? user.name[0].toUpperCase() : '👤';
      loadPosts();
    } else {
      document.getElementById('logoutBtn').classList.add('hidden');
      document.getElementById('userName').classList.add('hidden');
      document.getElementById('avatarBox').innerText = '👤';
      // Show login prompt
    }
  }

  // Auth change listen
  document.addEventListener('authChange', updateUI);

  // Initialize
  Auth.init().then(() => {
    updateUI();
  });

  // Keyboard shortcut: Escape to close modal
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.getElementById('postModal').classList.remove('active');
    }
  });

})();
</script>
</body>
</html>
