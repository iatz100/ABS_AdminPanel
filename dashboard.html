<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Blogger Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f4f7fc; min-height: 100vh; display: flex; justify-content: center; padding: 1.5rem; }
        .app { max-width: 1280px; width: 100%; background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .header h1 { font-size: 1.8rem; color: #1e293b; display: flex; align-items: center; gap: 0.5rem; }
        .header h1 i { color: #3b82f6; }
        .user-area { display: flex; align-items: center; gap: 1rem; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        .btn { padding: 0.5rem 1.2rem; border-radius: 60px; border: 1px solid #d1d9e6; background: white; cursor: pointer; font-weight: 500; transition: 0.15s; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn:hover { background: #f1f5f9; }
        .btn-success { background: #059669; color: white; border-color: #059669; }
        .btn-success:hover { background: #047857; }
        .btn-danger { background: #dc2626; color: white; border-color: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-warning { background: #d97706; color: white; border-color: #d97706; }
        .btn-warning:hover { background: #b45309; }
        .btn-outline { background: transparent; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; justify-content: space-between; }
        .search-box { display: flex; flex: 1; background: #f1f5f9; border-radius: 60px; padding: 0.2rem 0.2rem 0.2rem 1.2rem; align-items: center; min-width: 200px; }
        .search-box input { border: none; background: transparent; padding: 0.6rem 0.8rem; width: 100%; outline: none; }
        .search-box button { background: #1e293b; border: none; color: white; padding: 0.5rem 1.2rem; border-radius: 60px; cursor: pointer; }
        .search-box button:hover { background: #0f172a; }
        .action-group { display: flex; gap: 0.6rem; flex-wrap: wrap; }
        .post-list { display: flex; flex-direction: column; gap: 1rem; }
        .post-item { background: white; border-radius: 1.2rem; padding: 1.2rem 1.5rem; border: 1px solid #e9edf2; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; transition: 0.15s; }
        .post-item:hover { border-color: #cbd5e1; background: #fafcff; }
        .post-info { flex: 2 1 300px; }
        .post-info h3 { font-weight: 600; font-size: 1.1rem; color: #0f172a; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .post-info .meta { font-size: 0.8rem; color: #475569; display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 0.2rem; }
        .badge { padding: 0.1rem 0.6rem; border-radius: 40px; font-size: 0.7rem; font-weight: 500; }
        .badge.draft { background: #fef9c3; color: #854d0e; }
        .badge.published { background: #d1fae5; color: #065f46; }
        .post-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .post-actions .btn { padding: 0.25rem 0.9rem; font-size: 0.8rem; }
        .empty-state { text-align: center; padding: 3rem 1rem; color: #64748b; }
        .spinner { width: 32px; height: 32px; margin: 30px auto; border: 4px solid #e5e7eb; border-top: 4px solid #2563eb; border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); justify-content: center; align-items: center; z-index: 999; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: white; max-width: 600px; width: 100%; border-radius: 2rem; padding: 2rem; animation: fadeUp 0.2s; }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .modal-card h2 { margin-bottom: 1.2rem; color: #0f172a; }
        .modal-card label { display: block; margin: 0.8rem 0 0.2rem; font-weight: 500; font-size: 0.9rem; }
        .modal-card input, .modal-card textarea, .modal-card select { width: 100%; padding: 0.6rem 1rem; border: 1px solid #d1d9e6; border-radius: 60px; font-size: 0.95rem; background: #fafcff; }
        .modal-card textarea { border-radius: 1.2rem; min-height: 80px; resize: vertical; }
        .modal-card .row { display: flex; gap: 1rem; flex-wrap: wrap; }
        .modal-card .row > * { flex: 1; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 0.8rem; margin-top: 1.8rem; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast { padding: 12px 18px; margin-top: 10px; border-radius: 8px; font-size: 14px; color: white; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.success { background: #16a34a; }
        .toast.error { background: #dc2626; }
        .toast.info { background: #2563eb; }
        .pagination { display: flex; justify-content: center; gap: 1rem; margin-top: 2rem; }
        .pagination button { padding: 0.5rem 1.5rem; border: 1px solid #d1d9e6; background: white; border-radius: 60px; cursor: pointer; font-weight: 500; }
        .pagination button:hover { background: #f1f5f9; }
        @media (max-width: 640px) { .app { padding: 1.2rem; } .header h1 { font-size: 1.4rem; } .post-item { flex-direction: column; align-items: stretch; gap: 0.7rem; } }
        
        /* Debug info */
        .debug-info {
            background: #f1f5f9;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: #475569;
            display: none;
        }
        .debug-info.show {
            display: block;
        }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="app">
    <!-- Debug Info -->
    <div class="debug-info" id="debugInfo"></div>
    
    <!-- Header -->
    <div class="header">
        <h1><i class="fab fa-blogger-b"></i> Blogger Admin</h1>
        <div class="user-area">
            <span id="userName" style="font-weight: 500;">User</span>
            <div class="avatar" id="avatarBox">👤</div>
            <button class="btn btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search posts...">
            <button id="searchBtn"><i class="fas fa-arrow-right"></i></button>
        </div>
        <div class="action-group">
            <button class="btn btn-success" id="newPostBtn"><i class="fas fa-plus"></i> New Post</button>
            <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
    </div>

    <!-- Post List -->
    <div class="post-list" id="postList">
        <div class="spinner"></div>
    </div>
    
    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="postModal">
    <div class="modal-card">
        <h2 id="modalTitle">Create Post</h2>
        <label>Title *</label>
        <input type="text" id="postTitle" placeholder="Post title">
        <label>Content (HTML) *</label>
        <textarea id="postContent" placeholder="Write your post content..."></textarea>
        <div class="row">
            <div>
                <label>Labels (comma separated)</label>
                <input type="text" id="postLabels" placeholder="tech, lifestyle">
            </div>
            <div>
                <label>Status</label>
                <select id="postStatus">
                    <option value="DRAFT">Draft</option>
                    <option value="PUBLISHED">Published</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" id="modalCancelBtn">Cancel</button>
            <button class="btn btn-success" id="modalSaveBtn"><i class="fas fa-save"></i> Save</button>
        </div>
    </div>
</div>

<script>
// ============================================================
//  CONFIGURATION
// ============================================================
const CONFIG = {
    CLIENT_ID: '146025507938-3mnp25rn9ps0gi191ov3c6741n6fj9n6.apps.googleusercontent.com',
    BLOG_ID: '4609132939861743156',
};

// ============================================================
//  AUTH - Check token (FIXED)
// ============================================================
const Auth = {
    getToken() {
        const token = localStorage.getItem('blogger_access_token');
        const expiry = parseInt(localStorage.getItem('blogger_token_expiry') || '0');
        
        console.log('🔍 getToken called:', { 
            hasToken: !!token, 
            tokenPreview: token ? token.substring(0, 20) + '...' : 'null',
            expiry: expiry,
            now: Date.now(),
            isValid: token && expiry > Date.now()
        });
        
        if (!token || expiry <= Date.now()) {
            console.log('❌ No valid token found, redirecting to index.html');
            window.location.href = 'index.html';
            return null;
        }
        console.log('✅ Valid token found');
        return token;
    },
    
    async getUser() {
        try {
            const token = this.getToken();
            if (!token) return null;
            
            console.log('👤 Fetching user info...');
            const response = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { Authorization: `Bearer ${token}` }
            });
            
            if (!response.ok) {
                console.error('❌ Failed to fetch user:', response.status);
                throw new Error('Failed to fetch user');
            }
            
            const user = await response.json();
            console.log('✅ User fetched:', user.name);
            return user;
        } catch (error) {
            console.error('❌ Error fetching user:', error);
            window.location.href = 'index.html';
            return null;
        }
    },
    
    signOut() {
        console.log('🚪 Signing out...');
        const token = localStorage.getItem('blogger_access_token');
        if (token) {
            fetch(`https://oauth2.googleapis.com/revoke?token=${token}`, {
                method: 'POST'
            }).catch(() => {});
        }
        localStorage.removeItem('blogger_access_token');
        localStorage.removeItem('blogger_token_expiry');
        window.location.href = 'index.html';
    }
};

// ============================================================
//  BLOGGER API
// ============================================================
const Blogger = {
    async apiFetch(url, options = {}) {
        const token = Auth.getToken();
        if (!token) throw new Error('No token');
        
        console.log('📡 API Request:', url);
        const response = await fetch(url, {
            ...options,
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                ...options.headers
            }
        });
        
        if (!response.ok) {
            const error = await response.text();
            let message = error;
            try {
                const parsed = JSON.parse(error);
                message = parsed.error?.message || parsed.error || error;
            } catch (e) {}
            console.error('❌ API Error:', message);
            throw new Error(message || 'API request failed');
        }
        
        return response.json();
    },
    
    async listPosts({ pageToken = null, search = '' } = {}) {
        let url = `https://www.googleapis.com/blogger/v3/blogs/${CONFIG.BLOG_ID}/posts?fetchBodies=true&status=all&maxResults=10`;
        if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;
        if (search) url += `&q=${encodeURIComponent(search)}`;
        
        const data = await this.apiFetch(url);
        return {
            items: data.items || [],
            nextPageToken: data.nextPageToken || null,
            prevPageToken: data.prevPageToken || null,
        };
    },
    
    async createPost(post) {
        const url = `https://www.googleapis.com/blogger/v3/blogs/${CONFIG.BLOG_ID}/posts`;
        return this.apiFetch(url, {
            method: 'POST',
            body: JSON.stringify(post)
        });
    },
    
    async updatePost(postId, post) {
        const url = `https://www.googleapis.com/blogger/v3/blogs/${CONFIG.BLOG_ID}/posts/${postId}`;
        return this.apiFetch(url, {
            method: 'PUT',
            body: JSON.stringify(post)
        });
    },
    
    async deletePost(postId) {
        const url = `https://www.googleapis.com/blogger/v3/blogs/${CONFIG.BLOG_ID}/posts/${postId}`;
        await this.apiFetch(url, { method: 'DELETE' });
        return true;
    },
    
    async publishPost(postId) {
        const url = `https://www.googleapis.com/blogger/v3/blogs/${CONFIG.BLOG_ID}/posts/${postId}/publish`;
        return this.apiFetch(url, { method: 'POST' });
    },
    
    async revertPost(postId) {
        const url = `https://www.googleapis.com/blogger/v3/blogs/${CONFIG.BLOG_ID}/posts/${postId}/revert`;
        return this.apiFetch(url, { method: 'POST' });
    }
};

// ============================================================
//  DASHBOARD UI
// ============================================================
(function Dashboard() {
    console.log('🚀 Dashboard loading...');
    
    // Check authentication
    const token = Auth.getToken();
    if (!token) return;
    
    console.log('✅ Dashboard authenticated');
    
    const debugInfo = document.getElementById('debugInfo');
    const postList = document.getElementById('postList');
    const pagination = document.getElementById('pagination');
    const userName = document.getElementById('userName');
    const avatarBox = document.getElementById('avatarBox');
    const logoutBtn = document.getElementById('logoutBtn');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const newPostBtn = document.getElementById('newPostBtn');
    const modal = document.getElementById('postModal');
    const modalTitle = document.getElementById('modalTitle');
    const postTitle = document.getElementById('postTitle');
    const postContent = document.getElementById('postContent');
    const postLabels = document.getElementById('postLabels');
    const postStatus = document.getElementById('postStatus');
    const modalSaveBtn = document.getElementById('modalSaveBtn');
    const modalCancelBtn = document.getElementById('modalCancelBtn');
    const toastContainer = document.getElementById('toastContainer');
    
    let posts = [];
    let nextPageToken = null;
    let prevPageToken = null;
    let currentPageToken = null;
    let editingPostId = null;
    
    // Show debug info
    debugInfo.classList.add('show');
    debugInfo.innerHTML = `
        <strong>🔍 Debug Info:</strong><br>
        Token: ${token ? '✅ Present' : '❌ Missing'}<br>
        Token Expiry: ${localStorage.getItem('blogger_token_expiry') ? new Date(parseInt(localStorage.getItem('blogger_token_expiry'))).toLocaleString() : 'N/A'}
    `;
    
    // Load user info
    Auth.getUser().then(user => {
        if (user) {
            userName.textContent = user.name || 'User';
            avatarBox.textContent = user.name ? user.name[0].toUpperCase() : '👤';
            console.log('👤 User loaded:', user.name);
        }
    });
    
    // Toast notification
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = message;
        toastContainer.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
    
    // Render posts
    function renderPosts(items) {
        if (!items || items.length === 0) {
            postList.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-edit" style="font-size:2rem;opacity:0.3;"></i>
                    <p>No posts found. Create your first post!</p>
                </div>
            `;
            return;
        }
        
        postList.innerHTML = items.map(p => {
            const status = p.status || 'DRAFT';
            const labels = (p.labels || []).join(', ');
            const date = new Date(p.updated || p.published);
            const formattedDate = date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
            
            return `
            <div class="post-item" data-id="${p.id}">
                <div class="post-info">
                    <h3>
                        ${p.title || 'Untitled'} 
                        <span class="badge ${status.toLowerCase()}">${status}</span>
                    </h3>
                    <div class="meta">
                        <span><i class="far fa-calendar-alt"></i> ${formattedDate}</span>
                        ${labels ? `<span><i class="fas fa-tags"></i> ${labels}</span>` : ''}
                        ${p.url ? `<span><i class="fas fa-link"></i> <a href="${p.url}" target="_blank" style="color:#475569;text-decoration:none;">view</a></span>` : ''}
                    </div>
                </div>
                <div class="post-actions">
                    <button class="btn btn-outline edit-btn" data-id="${p.id}">
                        <i class="fas fa-edit"></i> Edit
                    </button>
                    <button class="btn btn-warning toggle-btn" data-id="${p.id}" data-status="${status}">
                        <i class="fas fa-pen-fancy"></i> ${status === 'DRAFT' ? 'Publish' : 'Draft'}
                    </button>
                    <button class="btn btn-danger delete-btn" data-id="${p.id}">
                        <i class="fas fa-trash-alt"></i> Delete
                    </button>
                </div>
            </div>
        `}).join('');
        
        // Edit button
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.dataset.id;
                const post = posts.find(p => p.id === id);
                if (post) openModal(post);
            });
        });
        
        // Delete button
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (!confirm('Delete this post permanently?')) return;
                try {
                    const id = btn.dataset.id;
                    await Blogger.deletePost(id);
                    showToast('Post deleted successfully', 'success');
                    await loadPosts();
                } catch (e) {
                    showToast('Delete failed: ' + e.message, 'error');
                }
            });
        });
        
        // Toggle button (Publish/Draft)
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.dataset.id;
                const currentStatus = btn.dataset.status;
                try {
                    if (currentStatus === 'DRAFT') {
                        await Blogger.publishPost(id);
                        showToast('Post published successfully', 'success');
                    } else {
                        await Blogger.revertPost(id);
                        showToast('Post reverted to draft', 'success');
                    }
                    await loadPosts();
                } catch (e) {
                    showToast('Status change failed: ' + e.message, 'error');
                }
            });
        });
    }
    
    // Pagination
    function renderPagination(nextToken, prevToken) {
        pagination.innerHTML = '';
        if (prevToken) {
            const prev = document.createElement('button');
            prev.textContent = '← Previous';
            prev.onclick = () => {
                currentPageToken = prevToken;
                loadPosts(currentPageToken);
            };
            pagination.appendChild(prev);
        }
        if (nextToken) {
            const next = document.createElement('button');
            next.textContent = 'Next →';
            next.onclick = () => {
                currentPageToken = nextToken;
                loadPosts(currentPageToken);
            };
            pagination.appendChild(next);
        }
    }
    
    // Load posts
    async function loadPosts(pageToken = null) {
        console.log('📥 Loading posts...');
        postList.innerHTML = '<div class="spinner"></div>';
        try {
            const search = searchInput.value.trim();
            const result = await Blogger.listPosts({
                pageToken: pageToken || currentPageToken,
                search
            });
            posts = result.items;
            nextPageToken = result.nextPageToken;
            prevPageToken = result.prevPageToken;
            console.log(`✅ Loaded ${posts.length} posts`);
            renderPosts(posts);
            renderPagination(nextPageToken, prevPageToken);
        } catch (e) {
            console.error('❌ Error loading posts:', e);
            showToast('Error loading posts: ' + e.message, 'error');
            postList.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle" style="font-size:2rem;opacity:0.3;"></i>
                    <p>${e.message}</p>
                </div>
            `;
        }
    }
    
    // Open modal
    function openModal(post = null) {
        if (post) {
            editingPostId = post.id;
            modalTitle.textContent = 'Edit Post';
            postTitle.value = post.title || '';
            postContent.value = post.content || '';
            postLabels.value = (post.labels || []).join(', ');
            postStatus.value = post.status || 'DRAFT';
        } else {
            editingPostId = null;
            modalTitle.textContent = 'Create New Post';
            postTitle.value = '';
            postContent.value = '';
            postLabels.value = '';
            postStatus.value = 'DRAFT';
        }
        modal.classList.add('active');
    }
    
    function closeModal() {
        modal.classList.remove('active');
    }
    
    // Save post
    async function savePost() {
        const title = postTitle.value.trim();
        const content = postContent.value.trim();
        const labels = postLabels.value.split(',').map(s => s.trim()).filter(Boolean);
        const status = postStatus.value;
        
        if (!title) {
            showToast('Title is required', 'error');
            postTitle.focus();
            return;
        }
        if (!content) {
            showToast('Content is required', 'error');
            postContent.focus();
            return;
        }
        
        const payload = { title, content, labels, status };
        
        try {
            if (editingPostId) {
                await Blogger.updatePost(editingPostId, payload);
                showToast('Post updated successfully', 'success');
            } else {
                await Blogger.createPost(payload);
                showToast('Post created successfully', 'success');
            }
            closeModal();
            await loadPosts();
        } catch (e) {
            showToast('Save failed: ' + e.message, 'error');
        }
    }
    
    // Event listeners
    logoutBtn.addEventListener('click', Auth.signOut);
    
    searchBtn.addEventListener('click', () => {
        currentPageToken = null;
        loadPosts(null);
    });
    
    searchInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') {
            currentPageToken = null;
            loadPosts(null);
        }
    });
    
    refreshBtn.addEventListener('click', () => {
        currentPageToken = null;
        loadPosts(null);
    });
    
    newPostBtn.addEventListener('click', () => openModal(null));
    
    modalCancelBtn.addEventListener('click', closeModal);
    
    modalSaveBtn.addEventListener('click', savePost);
    
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
            closeModal();
        }
    });
    
    // Load initial posts
    loadPosts();
    
})();
</script>
</body>
</html>
