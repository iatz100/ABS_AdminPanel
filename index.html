<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABS Blogger Admin</title>

<script src="https://accounts.google.com/gsi/client"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    text-align:center;
    width:320px;
}

h2{
    margin-top:0;
}

button{
    width:100%;
    padding:14px;
    font-size:17px;
    background:#4285F4;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#3367D6;
}

#status{
    margin-top:20px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="box">

<h2>ABS Blogger Admin</h2>

<button onclick="login()">
Login With Google
</button>

<div id="status"></div>

</div>

<script>

const CLIENT_ID = "146025507938-3mnp25rn9ps0gi191ov3c6741n6fj9n6.apps.googleusercontent.com";

let accessToken = "";

const tokenClient = google.accounts.oauth2.initTokenClient({

    client_id: CLIENT_ID,

    scope: "https://www.googleapis.com/auth/blogger",

    callback: (response) => {

        if(response.error){
            document.getElementById("status").innerHTML = response.error;
            return;
        }

        accessToken = response.access_token;

        // Token Save
        sessionStorage.setItem("access_token", accessToken);

        document.getElementById("status").innerHTML = "✅ Login Success";

        // Dashboard এ যাওয়ার আগে ১ সেকেন্ড অপেক্ষা
        setTimeout(()=>{
            window.location.href = "dashboard.html";
        },1000);

    }

});

function login(){

    tokenClient.requestAccessToken({
        prompt:"consent"
    });

}

</script>

</body>
</html>
