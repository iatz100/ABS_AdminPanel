<script>
  // ==================== config.js ====================
  // ==================== config.js ====================
// ==================== config.js ====================
const CONFIG = {
  CLIENT_ID: '146025507938-3mnp25rn9ps0gi191ov3c6741n6fj9n6.apps.googleusercontent.com',
  BLOG_ID: '4609132939861743156',
  SCOPES: 'https://www.googleapis.com/auth/blogger',
};

// ==================== auth.js (GIS) ====================
const Auth = (() => {
  let tokenClient = null;
  let accessToken = localStorage.getItem('blogger_access_token') || null;
  let tokenExpiry = parseInt(localStorage.getItem('blogger_token_expiry') || '0');
  let currentUser = null;
  let isSignedIn = false;

  function init() {
    return new Promise((resolve) => {
      if (typeof google === 'undefined') {
        const script = document.createElement('script');
        script.src = 'https://accounts.google.com/gsi/client';
        script.onload = () => resolve(initTokenClient());
        document.head.appendChild(script);
      } else {
        resolve(initTokenClient());
      }
    });
  }

  function initTokenClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CONFIG.CLIENT_ID,
      scope: CONFIG.SCOPES,
      callback: (resp) => {
        if (resp.access_token) {
          accessToken = resp.access_token;
          const expiresIn = resp.expires_in || 3600;
          tokenExpiry = Date.now() + (expiresIn * 1000) - 60000;
          localStorage.setItem('blogger_access_token', accessToken);
          localStorage.setItem('blogger_token_expiry', String(tokenExpiry));
          isSignedIn = true;
          fetchUserInfo();
        }
      },
    });
    if (accessToken && Date.now() < tokenExpiry) {
      isSignedIn = true;
      fetchUserInfo();
    } else if (accessToken) {
      tokenClient.requestAccessToken({ prompt: 'none' });
    }
    return tokenClient;
  }

  function fetchUserInfo() {
    if (!accessToken) return;
    fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${accessToken}` }
    })
      .then(r => r.json())
      .then(data => { currentUser = data; isSignedIn = true; })
      .catch(() => { isSignedIn = false; });
  }

  function signIn() {
    if (!tokenClient) return;
    tokenClient.requestAccessToken({ prompt: 'consent' });
  }

  function signOut() {
    if (accessToken) {
      fetch(`https://oauth2.googleapis.com/revoke?token=${accessToken}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
      }).catch(() => {});
    }
    localStorage.removeItem('blogger_access_token');
    localStorage.removeItem('blogger_token_expiry');
    accessToken = null;
    tokenExpiry = 0;
    isSignedIn = false;
    currentUser = null;
  }

  function getToken() {
    if (accessToken && Date.now() < tokenExpiry) {
      return accessToken;
    }
    if (tokenClient && accessToken) {
      tokenClient.requestAccessToken({ prompt: 'none' });
    }
    return null;
  }

  function refreshToken() {
    return new Promise((resolve) => {
      if (!tokenClient) {
        resolve(null);
        return;
      }
      const originalCallback = tokenClient.callback;
      tokenClient.callback = (resp) => {
        if (resp.access_token) {
          accessToken = resp.access_token;
          const expiresIn = resp.expires_in || 3600;
          tokenExpiry = Date.now() + (expiresIn * 1000) - 60000;
          localStorage.setItem('blogger_access_token', accessToken);
          localStorage.setItem('blogger_token_expiry', String(tokenExpiry));
          isSignedIn = true;
          resolve(accessToken);
        } else {
          resolve(null);
        }
        if (originalCallback) originalCallback(resp);
      };
      tokenClient.requestAccessToken({ prompt: 'none' });
    });
  }

  function isAuthenticated() {
    return isSignedIn && !!getToken();
  }

  function getUser() { return currentUser; }

  return { init, signIn, signOut, getToken, refreshToken, isAuthenticated, getUser };
})();

// ==================== blogger.js ====================
// Official Blogger API v3 implementation
const Blogger = (() => {
  const BLOG_ID = CONFIG.BLOG_ID;
  const API_BASE = `https://www.googleapis.com/blogger/v3/blogs/${BLOG_ID}`;

  function getHeaders() {
    const token = Auth.getToken();
    if (!token) throw new Error('No access token available');
    return {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    };
  }

  async function apiFetch(url, options = {}) {
    try {
      const res = await fetch(url, { ...options, headers: getHeaders() });

      if (res.status === 401) {
        const newToken = await Auth.refreshToken();
        if (newToken) {
          const retryRes = await fetch(url, {
            ...options,
            headers: {
              'Authorization': `Bearer ${newToken}`,
              'Content-Type': 'application/json'
            }
          });
          if (!retryRes.ok) {
            const err = await retryRes.text();
            let errorMessage = err;
            try {
              const parsed = JSON.parse(err);
              errorMessage = parsed.error?.message || parsed.error || err;
            } catch (e) {}
            throw new Error(errorMessage || 'API error after refresh');
          }
          return retryRes.json();
        } else {
          throw new Error('Session expired. Please sign in again.');
        }
      }

      if (!res.ok) {
        const err = await res.text();
        let errorMessage = err;
        try {
          const parsed = JSON.parse(err);
          errorMessage = parsed.error?.message || parsed.error || err;
        } catch (e) {}
        throw new Error(errorMessage || 'API error');
      }

      return res.json();
    } catch (error) {
      if (error.message.includes('No access token')) {
        throw new Error('Please sign in to continue');
      }
      throw error;
    }
  }

  // GET /blogs/{blogId}/posts
  async function listPosts({ pageToken = null, search = '' } = {}) {
    let url = `${API_BASE}/posts?fetchBodies=true&fetchImages=true&status=all&maxResults=10`;
    if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;
    if (search) url += `&q=${encodeURIComponent(search)}`;
    const data = await apiFetch(url);
    return {
      items: data.items || [],
      nextPageToken: data.nextPageToken || null,
      prevPageToken: data.prevPageToken || null,
    };
  }

  // POST /blogs/{blogId}/posts (posts.insert)
  async function createPost(post) {
    const url = `${API_BASE}/posts`;
    return apiFetch(url, {
      method: 'POST',
      body: JSON.stringify(post)
    });
  }

  // PUT /blogs/{blogId}/posts/{postId} (posts.update)
  async function updatePost(postId, post) {
    const url = `${API_BASE}/posts/${postId}`;
    return apiFetch(url, {
      method: 'PUT',
      body: JSON.stringify(post)
    });
  }

  // DELETE /blogs/{blogId}/posts/{postId} (posts.delete)
  async function deletePost(postId) {
    const url = `${API_BASE}/posts/${postId}`;
    await apiFetch(url, { method: 'DELETE' });
    return true;
  }

  // POST /blogs/{blogId}/posts/{postId}/publish (posts.publish)
  async function publishPost(postId) {
    const url = `${API_BASE}/posts/${postId}/publish`;
    return apiFetch(url, { method: 'POST' });
  }

  // POST /blogs/{blogId}/posts/{postId}/revert (posts.revert)
  async function revertPost(postId) {
    const url = `${API_BASE}/posts/${postId}/revert`;
    return apiFetch(url, { method: 'POST' });
  }

  return { listPosts, createPost, updatePost, deletePost, publishPost, revertPost };
})();

(function Dashboard() {
  const postList = document.getElementById('postList');
  const pagination = document.getElementById('pagination');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const userName = document.getElementById('userName');
  const avatarBox = document.getElementById('avatarBox');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const newPostBtn = document.getElementById('newPostBtn');
  const modal = document.getElementById('postModal');
  const modalTitle = document.getElementById('modalTitle');
  const postTitle = document.getElementById('postTitle');
  const postContent = document.getElementById('postContent');
  const postLabels = document.getElementById('postLabels');
  const postStatus = document.getElementById('postStatus');
  const modalSaveBtn = document.getElementById('modalSaveBtn');
  const modalCancelBtn = document.getElementById('modalCancelBtn');
  const toastContainer = document.getElementById('toastContainer');

  let posts = [];
  let nextPageToken = null;
  let prevPageToken = null;
  let currentPageToken = null;
  let editingPostId = null;

  function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
    toastContainer.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  function setLoading(loading) {
    if (loading) {
      postList.innerHTML = `<div class="spinner"></div>`;
    }
  }

  function renderPosts(items) {
    if (!items || items.length === 0) {
      postList.innerHTML = `<div class="empty-state"><i class="fas fa-edit" style="font-size:2rem;opacity:0.3;"></i><p>No posts found</p></div>`;
      return;
    }
    postList.innerHTML = items.map(p => {
      const status = p.status || 'DRAFT';
      const labels = (p.labels || []).join(', ');
      return `
      <div class="post-item" data-id="${p.id}">
        <div class="post-info">
          <h3>${p.title || 'Untitled'} <span class="badge ${status.toLowerCase()}">${status}</span></h3>
          <div class="meta">
            <span><i class="far fa-calendar-alt"></i> ${new Date(p.updated || p.published).toLocaleDateString()}</span>
            ${labels ? `<span><i class="fas fa-tags"></i> ${labels}</span>` : ''}
            ${p.url ? `<span><i class="fas fa-link"></i> <a href="${p.url}" target="_blank" style="color:#475569;">view</a></span>` : ''}
          </div>
        </div>
        <div class="post-actions">
          <button class="btn btn-outline btn-sm edit-btn" data-id="${p.id}"><i class="fas fa-edit"></i> Edit</button>
          <button class="btn btn-warning btn-sm draft-toggle" data-id="${p.id}" data-status="${status}"><i class="fas fa-pen-fancy"></i> ${status === 'DRAFT' ? 'Publish' : 'Draft'}</button>
          <button class="btn btn-danger btn-sm delete-btn" data-id="${p.id}"><i class="fas fa-trash-alt"></i> Delete</button>
        </div>
      </div>
    `}).join('');

    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const post = posts.find(p => p.id === id);
        if (post) openEditModal(post);
      });
    });

    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this post permanently?')) return;
        try {
          const id = btn.dataset.id;
          await Blogger.deletePost(id);
          showToast('Post deleted successfully', 'success');
          await loadPosts();
        } catch (e) {
          showToast('Delete failed: ' + e.message, 'error');
        }
      });
    });

    document.querySelectorAll('.draft-toggle').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const currentStatus = btn.dataset.status;
        try {
          if (currentStatus === 'DRAFT') {
            // Use posts.publish
            await Blogger.publishPost(id);
            showToast('Post published successfully', 'success');
          } else {
            // Use posts.revert
            await Blogger.revertPost(id);
            showToast('Post reverted to draft', 'success');
          }
          await loadPosts();
        } catch (e) {
          showToast('Status change failed: ' + e.message, 'error');
        }
      });
    });
  }

  function renderPagination(nextToken, prevToken) {
    pagination.innerHTML = '';
    if (prevToken) {
      const prev = document.createElement('button');
      prev.innerText = '← Previous';
      prev.onclick = () => {
        currentPageToken = prevToken;
        loadPosts(currentPageToken);
      };
      pagination.appendChild(prev);
    }
    if (nextToken) {
      const next = document.createElement('button');
      next.innerText = 'Next →';
      next.onclick = () => {
        currentPageToken = nextToken;
        loadPosts(currentPageToken);
      };
      pagination.appendChild(next);
    }
  }

  async function loadPosts(pageToken = null) {
    if (!Auth.isAuthenticated()) {
      postList.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><p>Please sign in with Google</p></div>`;
      pagination.innerHTML = '';
      return;
    }
    setLoading(true);
    try {
      const search = searchInput.value.trim();
      const result = await Blogger.listPosts({
        pageToken: pageToken || currentPageToken,
        search
      });
      posts = result.items;
      nextPageToken = result.nextPageToken;
      prevPageToken = result.prevPageToken;
      renderPosts(posts);
      renderPagination(nextPageToken, prevPageToken);
    } catch (e) {
      showToast('Error loading posts: ' + e.message, 'error');
      postList.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>${e.message}</p></div>`;
    }
    setLoading(false);
  }

  function openEditModal(post = null) {
    if (post) {
      editingPostId = post.id;
      modalTitle.innerText = 'Edit Post';
      postTitle.value = post.title || '';
      postContent.value = post.content || '';
      postLabels.value = (post.labels || []).join(', ');
      postStatus.value = post.status || 'DRAFT';
    } else {
      editingPostId = null;
      modalTitle.innerText = 'Create Post';
      postTitle.value = '';
      postContent.value = '';
      postLabels.value = '';
      postStatus.value = 'DRAFT';
    }
    modal.classList.add('active');
  }

  function closeModal() {
    modal.classList.remove('active');
  }

  async function savePost() {
    const title = postTitle.value.trim();
    const content = postContent.value.trim();
    const labels = postLabels.value.split(',').map(s => s.trim()).filter(Boolean);
    const status = postStatus.value;

    if (!title) {
      showToast('Title is required', 'error');
      return;
    }
    if (!content) {
      showToast('Content is required', 'error');
      return;
    }

    const payload = {
      title: title,
      content: content,
      labels: labels,
      status: status
    };

    try {
      if (editingPostId) {
        await Blogger.updatePost(editingPostId, payload);
        showToast('Post updated successfully', 'success');
      } else {
        await Blogger.createPost(payload);
        showToast('Post created successfully', 'success');
      }
      closeModal();
      await loadPosts();
    } catch (e) {
      showToast('Save failed: ' + e.message, 'error');
    }
  }

  function updateUI() {
    const signedIn = Auth.isAuthenticated();
    const user = Auth.getUser();
    if (signedIn && user) {
      loginBtn.classList.add('hidden');
      logoutBtn.classList.remove('hidden');
      userName.classList.remove('hidden');
      userName.innerText = user.name || 'User';
      avatarBox.innerText = user.name ? user.name[0].toUpperCase() : '👤';
      loadPosts();
    } else {
      loginBtn.classList.remove('hidden');
      logoutBtn.classList.add('hidden');
      userName.classList.add('hidden');
      avatarBox.innerText = '👤';
      postList.innerHTML = `<div class="empty-state"><i class="fab fa-google"></i><p>Sign in to manage your blog</p></div>`;
      pagination.innerHTML = '';
    }
  }

  // Event Listeners
  loginBtn.addEventListener('click', () => {
    Auth.signIn();
    const check = setInterval(() => {
      if (Auth.isAuthenticated()) {
        clearInterval(check);
        updateUI();
      }
    }, 500);
  });

  logoutBtn.addEventListener('click', () => {
    Auth.signOut();
    updateUI();
  });

  searchBtn.addEventListener('click', () => {
    currentPageToken = null;
    loadPosts(null);
  });

  searchInput.addEventListener('keyup', (e) => {
    if (e.key === 'Enter') {
      currentPageToken = null;
      loadPosts(null);
    }
  });

  refreshBtn.addEventListener('click', () => {
    currentPageToken = null;
    loadPosts(null);
  });

  newPostBtn.addEventListener('click', () => openEditModal(null));

  modalCancelBtn.addEventListener('click', closeModal);
  modalSaveBtn.addEventListener('click', savePost);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  // Initialize
  Auth.init().then(() => {
    updateUI();
    setInterval(async () => {
      if (Auth.isAuthenticated()) {
        await Auth.refreshToken();
      }
    }, 300000);
  });
})();
</script>
</body>
</html>
