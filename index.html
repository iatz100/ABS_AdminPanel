<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blogger CMS</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.box{
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
width:350px;
}

button{
padding:12px 20px;
font-size:16px;
cursor:pointer;
}
</style>

</head>
<body>

<div class="box">

<h2>Blogger CMS</h2>

<button onclick="login()">
Login with Google
</button>

<p id="status"></p>

</div>

<script>

const CLIENT_ID="146025507938-3mnp25rn9ps0gi191ov3c6741n6fj9n6.apps.googleusercontent.com";

let accessToken="";

const tokenClient=google.accounts.oauth2.initTokenClient({

client_id:CLIENT_ID,

scope:"https://www.googleapis.com/auth/blogger",

callback:(tokenResponse)=>{

accessToken=tokenResponse.access_token;

document.getElementById("status").innerHTML="✅ Login Success";

console.log(accessToken);

}

});

function login(){

tokenClient.requestAccessToken();

}

</script>

</body>
</html>
